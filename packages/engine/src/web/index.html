<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Houston Engine — test</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body { font: 15px/1.5 -apple-system, system-ui, sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; }
      header { padding: 12px 16px; border-bottom: 1px solid #8884; display: flex; align-items: center; gap: 12px; }
      header h1 { font-size: 15px; margin: 0; font-weight: 600; }
      #status { font-size: 13px; opacity: .8; margin-left: auto; }
      button { font: inherit; padding: 6px 14px; border-radius: 8px; border: 1px solid #8886; background: #7a5cff; color: #fff; cursor: pointer; }
      button:disabled { opacity: .5; cursor: default; }
      #log { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
      .msg { max-width: 80%; padding: 8px 12px; border-radius: 12px; white-space: pre-wrap; word-wrap: break-word; }
      .user { align-self: flex-end; background: #7a5cff; color: #fff; }
      .assistant { align-self: flex-start; background: #8882; }
      .tool { align-self: flex-start; font-size: 12px; opacity: .75; font-family: ui-monospace, monospace; }
      .err { align-self: flex-start; color: #e5484d; font-size: 13px; }
      footer { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid #8884; }
      #text { flex: 1; font: inherit; padding: 8px 12px; border-radius: 10px; border: 1px solid #8886; background: transparent; color: inherit; }
    </style>
  </head>
  <body>
    <header>
      <h1>🚀 Houston Engine</h1>
      <button id="connect">Connect Claude</button>
      <span id="status">checking…</span>
    </header>
    <div id="log"></div>
    <footer>
      <input id="text" placeholder="Message Houston…" autocomplete="off" disabled />
      <button id="send" disabled>Send</button>
    </footer>

    <script>
      const $ = (s) => document.querySelector(s);
      const log = $("#log"), statusEl = $("#status");
      let connected = false;

      function addMsg(cls, text) {
        const el = document.createElement("div");
        el.className = "msg " + cls;
        el.textContent = text;
        log.appendChild(el);
        log.scrollTop = log.scrollHeight;
        return el;
      }

      function setConnected(v) {
        connected = v;
        statusEl.textContent = v ? "✓ Claude connected" : "not connected";
        $("#connect").disabled = v;
        $("#text").disabled = !v;
        $("#send").disabled = !v;
        if (v) $("#text").focus();
      }

      async function refreshStatus() {
        try {
          const s = await (await fetch("/auth/status")).json();
          setConnected(!!s.anthropicConfigured);
          return s;
        } catch { statusEl.textContent = "engine unreachable"; }
      }

      $("#connect").onclick = async () => {
        statusEl.textContent = "opening Claude login…";
        const { url, error } = await (await fetch("/auth/anthropic/login", { method: "POST" })).json();
        if (error) { statusEl.textContent = "error: " + error; return; }
        window.open(url, "_blank", "noopener");
        statusEl.textContent = "waiting for you to authorize…";
        const poll = setInterval(async () => {
          const s = await refreshStatus();
          if (s?.anthropicConfigured) clearInterval(poll);
          else if (s?.login?.status === "error") { clearInterval(poll); statusEl.textContent = "login failed: " + s.login.error; }
        }, 1500);
      };

      async function send() {
        const text = $("#text").value.trim();
        if (!text || !connected) return;
        $("#text").value = "";
        addMsg("user", text);
        let bubble = null;
        const res = await fetch("/conversations/main/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });
        const reader = res.body.getReader();
        const dec = new TextDecoder();
        let buf = "";
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });
          let i;
          while ((i = buf.indexOf("\n\n")) >= 0) {
            const frame = buf.slice(0, i); buf = buf.slice(i + 2);
            const line = frame.split("\n").find((l) => l.startsWith("data:"));
            if (!line) continue;
            const evt = JSON.parse(line.slice(5).trim());
            if (evt.type === "text") {
              if (!bubble) bubble = addMsg("assistant", "");
              bubble.textContent += evt.data;
              log.scrollTop = log.scrollHeight;
            } else if (evt.type === "tool_start") {
              addMsg("tool", "🔧 " + evt.data.name + " " + JSON.stringify(evt.data.args ?? {}));
            } else if (evt.type === "tool_end") {
              if (evt.data.isError) addMsg("err", "tool " + evt.data.name + " failed");
            } else if (evt.type === "error") {
              addMsg("err", "⚠️ " + evt.data.message);
            } else if (evt.type === "done") {
              bubble = null;
            }
          }
        }
      }

      $("#send").onclick = send;
      $("#text").addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
      });

      refreshStatus();
    </script>
  </body>
</html>
