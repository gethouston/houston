# Serves the SPA AND reverse-proxies /api/* to the control-plane, so the browser
# only ever talks HTTPS to one origin (Cloud Run) — no CORS, no mixed content,
# and Supabase will honor the https redirect.
server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # API → control-plane LoadBalancer. The trailing slash strips the /api prefix
  # (/api/agents → /agents). Buffering off + long read timeout so SSE streams work.
  location /api/ {
    proxy_pass http://CONTROL_PLANE_HOST/;  # set at deploy time
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection "";
    proxy_set_header Authorization $http_authorization;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # SPA: every other path serves index.html (client routing + the OAuth callback).
  location / {
    try_files $uri $uri/ /index.html;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
