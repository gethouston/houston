<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Houston Engine — test</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body { font: 15px/1.5 -apple-system, system-ui, sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; }
      header { padding: 10px 16px; border-bottom: 1px solid #8884; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
      header h1 { font-size: 15px; margin: 0 8px 0 0; font-weight: 600; }
      #status { font-size: 13px; opacity: .8; margin-left: auto; }
      button, select { font: inherit; padding: 6px 12px; border-radius: 8px; border: 1px solid #8886; background: #7a5cff; color: #fff; cursor: pointer; }
      select { background: transparent; color: inherit; }
      button:disabled { opacity: .5; cursor: default; }
      #new { background: transparent; color: inherit; }
      #log { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
      .msg { max-width: 80%; padding: 8px 12px; border-radius: 12px; white-space: pre-wrap; word-wrap: break-word; }
      .user { align-self: flex-end; background: #7a5cff; color: #fff; }
      .assistant { align-self: flex-start; background: #8882; }
      .tool { align-self: flex-start; font-size: 12px; opacity: .75; font-family: ui-monospace, monospace; }
      .err { align-self: flex-start; color: #e5484d; font-size: 13px; }
      .note { align-self: center; font-size: 13px; opacity: .8; background: #8881; padding: 6px 10px; border-radius: 8px; }
      footer { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid #8884; }
      #text { flex: 1; font: inherit; padding: 8px 12px; border-radius: 10px; border: 1px solid #8886; background: transparent; color: inherit; }
    </style>
  </head>
  <body>
    <header>
      <h1>🚀 Houston Engine</h1>
      <span id="providers"></span>
      <select id="model" title="model" style="display:none"></select>
      <button id="new" title="new chat">＋ New</button>
      <span id="status">checking…</span>
    </header>
    <div id="log"></div>
    <footer>
      <input id="text" placeholder="Message Houston…" autocomplete="off" disabled />
      <button id="send" disabled>Send</button>
    </footer>

    <script>
      const $ = (s) => document.querySelector(s);
      const log = $("#log"), statusEl = $("#status");
      let activeProvider = null;

      function addMsg(cls, text) {
        const el = document.createElement("div");
        el.className = cls === "note" ? "note" : "msg " + cls;
        el.textContent = text;
        log.appendChild(el);
        log.scrollTop = log.scrollHeight;
        return el;
      }
      function setChatEnabled(v) {
        $("#text").disabled = !v; $("#send").disabled = !v;
        if (v) $("#text").focus();
      }
      const newId = () =>
        globalThis.crypto?.randomUUID ? crypto.randomUUID() : "test-" + Date.now();

      async function refresh() {
        let providers;
        try {
          providers = await (await fetch("/providers")).json();
        } catch { statusEl.textContent = "engine unreachable"; return; }

        const box = $("#providers"); box.innerHTML = "";
        for (const p of providers) {
          const b = document.createElement("button");
          b.textContent = (p.configured ? "✓ " : "Connect ") + p.name;
          b.disabled = p.configured;
          b.onclick = () => connect(p.id, p.name);
          box.appendChild(b);
        }

        const active = providers.find((p) => p.isActive);
        activeProvider = active?.id ?? null;
        const sel = $("#model");
        if (active) {
          sel.style.display = "";
          sel.innerHTML = "";
          for (const m of active.models) {
            const o = document.createElement("option");
            o.value = m; o.textContent = m; if (m === active.activeModel) o.selected = true;
            sel.appendChild(o);
          }
          sel.onchange = () => fetch("/settings", {
            method: "PUT", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ activeProvider: active.id, model: sel.value }),
          });
        } else sel.style.display = "none";

        statusEl.textContent = activeProvider ? `✓ ${active.name} ready` : "not connected";
        setChatEnabled(!!activeProvider);
      }

      async function connect(provider, name) {
        statusEl.textContent = `starting ${name} login…`;
        let info;
        try {
          info = await (await fetch(`/auth/${provider}/login`, { method: "POST" })).json();
        } catch (e) { statusEl.textContent = "login error"; return; }
        if (info.error) { statusEl.textContent = "error: " + info.error; return; }

        if (info.kind === "url") {
          window.open(info.url, "_blank", "noopener");
          statusEl.textContent = "authorize in the new tab…";
        } else if (info.kind === "device_code") {
          window.open(info.verificationUri, "_blank", "noopener");
          addMsg("note", `Codex: open ${info.verificationUri} and enter code  ${info.userCode}`);
          statusEl.textContent = `enter code ${info.userCode} at ${info.verificationUri}`;
        }

        const poll = setInterval(async () => {
          const s = await (await fetch("/auth/status")).json();
          const pr = s.providers.find((x) => x.provider === provider);
          if (pr?.configured) { clearInterval(poll); refresh(); }
          else if (pr?.login?.status === "error") {
            clearInterval(poll); statusEl.textContent = "login failed: " + pr.login.error;
          }
        }, 1500);
      }

      // --- One isolated conversation: subscribe to its id-scoped event stream. ---
      let convId = newId();
      let events = null;
      let bubble = null;
      const ownNonces = new Set();

      function handleEvent(evt) {
        if (evt.type === "sync") {
          if (evt.data.running && evt.data.partial) bubble = addMsg("assistant", evt.data.partial);
        } else if (evt.type === "user") {
          if (evt.data.nonce && ownNonces.has(evt.data.nonce)) return; // our own echo
          addMsg("user", evt.data.content);
        } else if (evt.type === "text") {
          if (!bubble) bubble = addMsg("assistant", "");
          bubble.textContent += evt.data; log.scrollTop = log.scrollHeight;
        } else if (evt.type === "tool_start") {
          addMsg("tool", "🔧 " + evt.data.name + " " + JSON.stringify(evt.data.args ?? {}));
        } else if (evt.type === "tool_end") {
          if (evt.data.isError) addMsg("err", "tool " + evt.data.name + " failed");
        } else if (evt.type === "error") {
          addMsg("err", "⚠️ " + evt.data.message); bubble = null;
        } else if (evt.type === "done") {
          bubble = null;
        }
      }

      function subscribe() {
        if (events) events.close();
        bubble = null;
        events = new EventSource(`/conversations/${encodeURIComponent(convId)}/events`);
        events.onmessage = (m) => handleEvent(JSON.parse(m.data));
      }

      function newChat() {
        convId = newId();
        ownNonces.clear();
        log.innerHTML = "";
        subscribe();
      }

      async function send() {
        const text = $("#text").value.trim();
        if (!text || !activeProvider) return;
        $("#text").value = "";
        const nonce = newId();
        ownNonces.add(nonce);
        addMsg("user", text);
        bubble = null;
        await fetch(`/conversations/${encodeURIComponent(convId)}/messages`, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, nonce }),
        });
      }

      $("#send").onclick = send;
      $("#new").onclick = newChat;
      $("#text").addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
      });
      subscribe();
      refresh();
    </script>
  </body>
</html>
