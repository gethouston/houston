# Web / desktop surface parity manifest.
#
# The React frontend in `app/src` (also shipped verbatim as `packages/web`),
# built on the `@houston-ai/*` ui packages. This surface is ENFORCED: it must
# implement (implemented or partial, never not-started/missing) every inventory
# component whose `since <= inventoryVersion`. `pnpm check:parity` fails the
# build otherwise. `ref` points at where the component lives today.
#
# Honesty note: `partial` flags a real structural gap even when the component
# ships and works -- typically because the reusable, view-model-driven piece is
# not yet in a shared `ui/` package (it is app/-locked), so a native surface
# cannot reuse its structure. Those are the extract-before-mobile items.

surface: web
enforced: true
inventoryVersion: 4

components:
  agent-avatar:
    status: implemented
    ref: "@houston-ai/core HoustonAvatar / AgentAvatar (resolveAgentColor)"

  agent-list-item:
    status: partial
    ref: "@houston-ai/layout SidebarNavItem + @houston-ai/core HoustonAvatar"
    notes: >-
      No single shared agent-list-item component; the row is composed in app/
      from generic nav + avatar primitives. Aggregate status is app-side.

  conversation-feed:
    status: implemented
    ref: "@houston-ai/chat ChatPanel / ChatMessages / Conversation"

  assistant-message:
    status: implemented
    ref: "@houston-ai/chat ai-elements/message + markdown-code-block"

  user-message:
    status: implemented
    ref: "@houston-ai/chat user-attachment-message + author-label"

  thinking-indicator:
    status: implemented
    ref: "@houston-ai/chat ai-elements/reasoning + chat-status (deriveStatus)"

  tool-call-chip:
    status: implemented
    ref: "@houston-ai/chat ai-elements/tool-block + tool-formatters"

  provider-error-card:
    status: partial
    ref: "app/src/components/shell/provider-error-cards/* (types in @houston-ai/chat)"
    notes: >-
      Feed types + ProviderError taxonomy live in @houston-ai/chat, but the
      rendered cards are app/-locked. Extract into ui/ before mobile can reuse.

  agent-provisioning-card:
    status: partial
    ref: "app/src/components/shell/agent-provisioning-card.tsx (+ agent-warming-dialog.tsx)"
    notes: >-
      Card + blocked-write dialog are app/-locked and read the app's Zustand
      provisioning store directly. Extract a props-driven ui/ piece before
      mobile.

  system-message:
    status: implemented
    ref: "@houston-ai/chat chat-system-message"

  skill-invocation-message:
    status: partial
    ref: "@houston-ai/chat skill-message (decode) rendered in app/"
    notes: Marker decode is shared; the card render is composed in app/.

  composer:
    status: implemented
    ref: "@houston-ai/chat ChatInput / ai-elements/prompt-input"

  turn-status:
    status: implemented
    ref: "@houston-ai/chat ChatStatusLine + chat-status"

  progress-panel:
    status: implemented
    ref: "@houston-ai/chat ProgressPanel / useProgressSteps"

  approval-surface:
    status: implemented
    ref: "@houston-ai/review ReviewItem / ReviewDetailPanel / DeliverableCard"

  interaction-card:
    status: implemented
    ref: "@houston-ai/chat ChatInteractionCard (interaction-card + interaction-card-logic)"

  interaction-approval-card:
    status: partial
    ref: "app/src/components/chat-approval-interaction-card.tsx (on @houston-ai/chat InteractionModal shell, via renderApproval)"
    notes: >-
      The shared InteractionModal shell + the stepper's renderApproval seam are in
      @houston-ai/chat, but the composed approval card (app-identity resolution,
      permission question, three-decision footer, keyboard handling) is
      app/-locked and Composio-coupled, mirroring the app-supplied
      renderConnect/renderSignin bodies. Extract before mobile can reuse its
      structure.

  plan-ready-card:
    status: implemented
    ref: "@houston-ai/chat ChatPlanReadyCard (chat-plan-ready-card + chat-plan-ready-card-model)"

  suggest-reusable-card:
    status: implemented
    ref: "@houston-ai/chat ChatSuggestReusableCard (chat-suggest-reusable-card + chat-suggest-reusable-card-model)"

  interaction-answers-message:
    status: partial
    ref: "@houston-ai/chat interaction-answers-message (decode) + UserInteractionAnswersMessage; encode in app/"
    notes: Decode + render are shared; the marker encoder is composed in app/ (interaction-reply), mirroring skill-invocation-message.

  deliverable-card:
    status: implemented
    ref: "@houston-ai/review DeliverableCard / UserFeedback"

  mission-card:
    status: implemented
    ref: "@houston-ai/board KanbanCard / KanbanListItem"

  mission-board:
    status: implemented
    ref: "@houston-ai/board KanbanBoard / AIBoard / KanbanColumn"

  mission-status-chip:
    status: partial
    ref: "@houston-ai/board + @houston-ai/review (per-package)"
    notes: >-
      Status rendering is duplicated across kanban-card, conversation-list and
      review-item with divergent RunStatus enums. No shared status chip yet.

  routine-row:
    status: implemented
    ref: "@houston-ai/routines RoutineRow / RoutinesGrid"

  skill-row:
    status: partial
    ref: "ui/skills skill-marketplace-row.tsx + app/src/components/tabs/installed-skills-strip.tsx"
    notes: >-
      Rides the shared ui/ catalog family (CatalogRow / CatalogAddButton /
      CatalogShowMore / CatalogShell); the skills composition itself is split
      between ui/skills and app/. Extract the surface before mobile.

  empty-state:
    status: implemented
    ref: "@houston-ai/core Empty"

  toast:
    status: implemented
    ref: "@houston-ai/core sonner / toast-container"

  ai-provider-card:
    status: partial
    ref: "app/src/components/ai-hub/providers-pane.tsx + provider-browser/provider-row.tsx"
    notes: >-
      The hub row rides the shared ui/ catalog family (CatalogRow /
      CatalogAddButton / CatalogShell); the provider-specific composition and
      the connect-flow card are still app/-locked. Extract before mobile.

  provider-usage-card:
    status: partial
    ref: "app/src/components/usage-view/usage-provider-card.tsx (+ usage-pane.tsx, usage-model.ts)"
    notes: >-
      Ships on the hub's Usage tab but is app/-locked (the pure pairing/format
      model and the card composition live in app/, not a shared ui/ package).
      Extract before mobile.

  ai-model-row:
    status: partial
    ref: "app/src/components/ai-hub/model-card-row.tsx (in models-browser.tsx)"
    notes: >-
      The row rides the shared ui/ catalog family (CatalogRow / CatalogGrid);
      the facet controls (ModelsBrowser) are app/-locked in the hub and shared
      by the directory and the provider modal. Extract before mobile.

  ai-model-offer-row:
    status: partial
    ref: "app/src/components/ai-hub/model-offer-row.tsx (on cards/row-card.tsx)"
    notes: >-
      Built on the shared RowCard but composed app-side with the connections
      layer. Extract into ui/ before mobile.

  verified-badge:
    status: implemented
    ref: "ui/core/src/components/verified-badge.tsx (@houston-ai/core VerifiedBadge)"
