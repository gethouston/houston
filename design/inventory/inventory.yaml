# Houston cross-surface component inventory
#
# THE CONTRACT
# ------------
# This file is the single source of truth for WHICH product components exist
# across Houston's surfaces and WHAT each one is (anatomy, states, semantics,
# a11y). It handles STRUCTURAL parity only:
#
#   - BEHAVIOR parity  -> owned by the shared SDK view-models (packages/sdk).
#   - LOOK parity      -> owned by design tokens (packages/design-tokens).
#   - STRUCTURE parity -> owned by THIS inventory: does the component exist on
#                         each surface, with the same anatomy/states/semantics?
#
# Every entry here is surface-AGNOSTIC. It describes the component once; each
# surface (web/desktop, iOS, Android) then declares in its own manifest under
# manifests/ whether it implements that component (implemented|partial|
# not-started). scripts/check-parity.mjs (pnpm check:parity) enforces the
# contract in CI: an enforced surface may not lag its declared inventoryVersion.
#
# SCOPE: only components that are genuinely cross-surface (will exist on native
# mobile) belong here. Desktop-only chrome (menu bars, resizable panes, the file
# tree, the schedule/cron editor, skill-authoring dialogs) is deliberately
# excluded -- see design/inventory/README.md for the exclusion rationale.
#
# CHANGE FLOW: add/modify a component -> bump `version` -> add a CHANGELOG.md
# entry -> update every ENFORCED surface manifest in the SAME PR. Unenforced
# surfaces catch up later and bump their manifest's inventoryVersion when they do.
#
# Field reference (all fields required per component):
#   id       kebab-case stable identifier (never reused/renamed without a bump)
#   title    human name
#   purpose  one line: what it is / when it appears
#   anatomy  named structural parts
#   states   distinct render states (incl. loading/empty/error/streaming where real)
#   variants shape/context variants that are the SAME component
#   behavior semantic notes: what the SDK view-model drives (not styling)
#   a11y     roles / labels / focus expectations the surface must honor
#   since    inventory version this component first appeared in

version: 25

components:
  - id: agent-avatar
    title: Agent avatar
    purpose: Identity badge for an agent -- colored helmet glyph, resting vs running.
    anatomy: [glyph, color-fill, running-glow-ring]
    states: [resting, running]
    variants: [sizes-xs-to-xl, channel-source-avatar]
    behavior: >-
      Stored semantic color id resolves to a palette entry (resolveAgentColor);
      running state is driven by the agent's live run status, not local hover.
    a11y: Decorative when paired with a text label; else img role with the agent name as label.
    since: 1

  - id: agent-list-item
    title: Agent list item
    purpose: A single agent row/card in the agent list or sidebar.
    anatomy: [avatar, name, status-chip, unread-or-count-slot, trailing-actions]
    states: [idle, running, needs-you, selected, focused]
    variants: [sidebar-rail-collapsed, list-row, grid-card]
    behavior: >-
      Selection and run status come from the view-model; the row reflects the
      agent's aggregate mission state, not a single conversation.
    a11y: button/listitem role, name as accessible label, aria-current when selected.
    since: 1

  - id: conversation-feed
    title: Conversation feed
    purpose: The scrolling transcript that hosts every message/tool/system item.
    anatomy: [scroll-viewport, item-list, stick-to-bottom-anchor, scroll-to-bottom-button]
    states: [empty, loading-history, streaming, idle, error]
    variants: [single-player, multiplayer]
    behavior: >-
      Renders an ordered FeedItem stream; auto-sticks to bottom while streaming
      unless the user scrolled up. Item ordering/merge is view-model driven.
    a11y: log role with aria-live=polite for appended items; preserves scroll on prepend.
    since: 1

  - id: assistant-message
    title: Assistant message
    purpose: A model turn's prose -- markdown, no bubble, left aligned.
    anatomy: [markdown-body, code-block, inline-links, copy-action]
    states: [streaming, complete]
    variants: [with-code, plain-prose]
    behavior: >-
      assistant_text vs assistant_text_streaming decide whether the body grows
      token-by-token; copy acts on the resolved markdown source.
    a11y: article/group role; code blocks keyboard-selectable; copy button labeled.
    since: 1

  - id: user-message
    title: User message
    purpose: A message the user (or a teammate) sent, right-aligned bubble.
    anatomy: [bubble, author-label, attachment-chips]
    states: [default, with-attachments]
    variants: [single-player, multiplayer-authored]
    behavior: >-
      In multiplayer the author field labels a teammate's bubble; single-player
      omits it. Attachment/skill markers are decoded to a clean preview.
    a11y: group role; author announced in multiplayer; attachments labeled.
    since: 1

  - id: thinking-indicator
    title: Thinking / reasoning indicator
    purpose: Signals the model is working -- reasoning block or the pre-token wait.
    anatomy: [helmet-glyph, shimmer-label, collapsible-reasoning-body]
    states: [submitted-waiting, streaming-thoughts, collapsed, expanded]
    variants: [typing-bounce-dots, reasoning-collapsible]
    behavior: >-
      Shown while a turn is in flight with no visible stream (deriveStatus =
      submitted); yields to the stream once tokens appear. Reasoning content is
      thinking / thinking_streaming feed items.
    a11y: aria-live=polite status text; expand/collapse is a labeled toggle button.
    since: 1

  - id: tool-call-chip
    title: Tool call chip
    purpose: Collapsible display of one tool invocation and its result.
    anatomy: [tool-icon, action-label, chevron, collapsible-output, result-status]
    states: [running, success, error, collapsed, expanded]
    variants: [default-auto-collapse, bash-collapsed-by-default]
    behavior: >-
      Auto-opens while running, auto-collapses shortly after the result; Bash
      stays collapsed. Label derives from tool name + input via tool-labels.
    a11y: toggle button with tool action as label; error state announced.
    since: 1

  - id: provider-error-card
    title: Provider error card
    purpose: Actionable card for a provider failure in the feed (auth, quota, rate-limit).
    anatomy: [icon-bubble, title, reason, primary-action, secondary-action]
    states: [unauthenticated, quota-exhausted, rate-limited, model-unavailable, context-overflow, transient]
    variants: [single-action-row-card, multi-action-error-card]
    behavior: >-
      provider_error feed items carry a typed ProviderError (cause/scope). The
      card maps each taxonomy variant to its reconnect/upgrade/retry affordance.
    a11y: alert role; each action a labeled button; status-page link where relevant.
    since: 1

  - id: agent-provisioning-card
    title: Agent provisioning card
    purpose: >-
      In-chat notice under a sent message while a just-created agent's hosted
      engine is still warming up, so the wait reads as expected, not broken.
    anatomy: [spinner, title, body]
    states: [default]
    variants: [chat-card, blocked-write-dialog]
    behavior: >-
      Driven by the client-side provisioning presence map: marked on hosted
      agent create, cleared by a readiness long-poll against the agent's
      engine. The chat-card sits under the user's sent (queued) message; the
      blocked-write-dialog opens when a write is attempted while warming —
      reads stay free (tabs render with empty data). Queued sends deliver on
      ready; both surfaces dismiss themselves.
    a11y: status role; spinner decorative, text carries the message.
    since: 3

  - id: system-message
    title: System message / boundary
    purpose: Non-message feed events -- system notes and context/provider boundaries.
    anatomy: [divider-rule, centered-italic-label]
    states: [system-note, context-compacted, provider-switched]
    variants: [plain-note, divider-boundary]
    behavior: >-
      system_message renders a centered note; context_compacted and
      provider_switched render subtle dividers that keep the full chat visible.
    a11y: separator role for boundaries; note text exposed to the a11y tree.
    since: 1

  - id: skill-invocation-message
    title: Skill invocation message
    purpose: Shows that the user ran a Skill, as a decoded card in the feed.
    anatomy: [skill-image, skill-title, field-summary]
    states: [default]
    variants: [with-image, initial-fallback]
    behavior: >-
      A user-message marker (decodeSkillMessage) is decoded to a structured
      payload so every surface renders the same card instead of the raw marker.
    a11y: group role labeled with the skill name; image is decorative.
    since: 1

  - id: composer
    title: Composer
    purpose: The signature message-input surface -- text, attachments, send/stop.
    anatomy: [leading-attach, textarea, footer-slot, queued-list, trailing-send-stop]
    states: [ready, submitted, streaming, has-attachments, drag-over, disabled]
    variants: [single-line, multiline-expanded]
    behavior: >-
      Send is gated on non-empty text/attachments; while streaming the trailing
      button becomes Stop. Queued messages show when sending mid-turn.
    a11y: labeled textarea; send/stop button state-labeled; drop zone announced.
    since: 1

  - id: turn-status
    title: Turn status line
    purpose: The helmet + muted label line reporting the current turn state.
    anatomy: [helmet-glyph, status-label, shimmer]
    states: [idle, active-shimmer]
    variants: [inline-in-feed, standalone-on-card]
    behavior: >-
      Label + active flag come from deriveStatus over the feed; shimmer marks an
      ongoing/pending state. Inline-safe so it can sit inside markdown prose.
    a11y: status role; label announced politely; shimmer is presentational only.
    since: 1

  - id: progress-panel
    title: Progress panel
    purpose: Agent-declared step checklist for a running mission.
    anatomy: [header-count, step-row, step-status-icon]
    states: [pending, active, done, empty]
    variants: [side-panel, sidebar-card]
    behavior: >-
      Steps come from the agent's update_progress calls (or are derived from
      tool activity); header shows "X of Y complete".
    a11y: list role; each step's status conveyed as text, not color alone.
    since: 1

  - id: approval-surface
    title: Approval / needs-you surface
    purpose: Where a mission awaiting the user is reviewed and approved.
    anatomy: [item-title, status-indicator, deliverable-preview, approve-action, feedback-input]
    states: [needs-you, running, approved, error, empty]
    variants: [list-item, detail-panel]
    behavior: >-
      needs_you items are surfaced for the user to review; approve advances the
      mission, feedback returns it to the agent. Status drives the indicator.
    a11y: needs-you item announced; approve is a labeled primary button; live status.
    since: 1

  - id: interaction-card
    title: Interaction card
    purpose: In-chat surface shown when the agent pauses mid-turn to gather what it needs before continuing; a stepper that walks the user through one step at a time (questions, then sign-in, then connections, then action approvals), floating ABOVE the always-mounted composer.
    anatomy: [modal-shell, modal-header, step-title, step-title-icon, pager, dismiss-action, option-row, number-badge, recommended-chip, selected-arrow, free-text-escape-field, pencil-adornment, footer-row, unified-decline, decline-esc-hint, step-cta, return-key-glyph, app-logo, integration-name, reason-line, app-description, connected-check, waiting-note]
    states: [single-step, multi-step, with-options, single-option, recommended-option, free-text-only, signin-step, connect-step, connecting, connected, skipped, revisited, reconsider, abandoned, disabled]
    variants: [choice, open-ended, signin, connect, mixed-sequence]
    behavior: >-
      Rendered from the turn's pending interaction (steps[]: 1-3 question steps,
      then at most one signin step, then connect steps, then approval steps —
      approvals land LAST, since approving an action happens after its toolkit is
      connected; the approval step's body is its own component,
      interaction-approval-card, injected via a `renderApproval` prop the way
      signin/connect bodies are). Every step is composed in
      ONE shared modal shell (InteractionModal) that owns the chrome — a white
      card with a hairline border and roomy padding (the reference "Coworker card"
      look; a card-surface same colour as the page, set apart by border + soft
      shadow, theme-aware tokens keep dark mode sane), a HEADER row, a body that
      fades on step swap, and a right-aligned FOOTER row — so the question
      stepper, the sign-in step, and the connect step are structurally identical
      and differ only in the title / body / footer nodes they hand in. Shows ONE
      step at a time. Weight is restrained across the whole family: color tone
      (foreground vs muted) carries the hierarchy — the modal title and the option
      / identity labels are REGULAR weight, never bold; the only font-medium left
      is the Recommended chip, the number badge digit, and the filled CTA label.
      Header: the step TITLE left (a question's text, or a signin/connect step's
      '(icon) NAME' identity lockup — the real brand logo beside the integration
      NAME, "Google Sheets" / "Houston") with, top-RIGHT on the same row, a
      compact "N of M" pager whose chevrons ARE the Back/Forward navigation
      (hidden for a single-step sequence) plus a dismiss X that abandons the WHOLE
      sequence. This '(icon) NAME' header title is the family convention for ANY
      card carrying an app/brand icon (the action-approval card adopts it too;
      suggest-reusable and plan-ready have no app icon and keep their own
      headers). The card never replaces the composer: the real composer stays
      mounted below it, and sending a fresh message there abandons the sequence
      exactly like the X. Dismissing (the X, or typing a fresh message) is a user
      INTERRUPTION, not an answer: it persists a durable `stopped` marker on the
      turn AND clears the pending interaction, so the sequence retires and the
      MODEL LEARNS NOTHING from the abandonment (a reload renders the standard
      "Stopped by user" line, never the card again — live and reload settle
      identically); the mid-turn race is refused (409). Question step: single-select option rows (role=radio)
      each carry a LEFT circular number badge (the digit is the keyboard shortcut
      — pressing it selects the row whenever focus is not in a text field), a
      regular-weight label, and an optional soft "Recommended" chip (at most one
      option). The option's wire `description` is TOLERATED but NOT rendered — the
      label + chip say enough. The row surface is transparent until hover/selected,
      when it fills a soft grey and reveals a trailing arrow; clicking answers and
      advances. Below the option rows is the free-text ESCAPE FIELD — an honest
      input: a hairline field border (the design system's border-input/bg-transparent
      vocabulary, shared with the composer and every Input), a text cursor over its
      whole surface, and a border-ring focus state, so its resting look promises
      the text input it becomes. A pencil adornment sits at left and a placeholder
      ("None of these..." when options are present, else a neutral answer prompt);
      clicking anywhere in the field focuses it, typing expands it and Enter
      submits. The card-wide decline is NOT in this field — it lives in the
      FOOTER. Every step kind shares ONE unified decline word ("Not now") + Esc
      keycap hint in the footer: a question's footer is that decline ALONE (no
      primary CTA — clicking an option is the advance), while a signin/connect
      footer places it beside the single filled CTA pill ("Connect" / "Sign in",
      with a return-key glyph). Skip/decline advances past ANY step kind without
      completing it — a skipped question is omitted from the composed reply, while
      a skipped signin/connect is a recorded fact the reply states ("Skipped
      connecting {app}." / "Skipped signing in.") so the agent hears the decline
      instead of re-requesting. Esc declines on every kind (Enter also fires the
      CTA on signin/connect); a capture-phase handler pre-empts the global
      Escape-closes-the-panel shortcut when it acts, and yields to the composer
      while a field has focus. Navigation is the header pager for every kind, so
      the body carries no nav button: ui/chat (auth/Composio-unaware) owns the
      shell, the pager, and the callbacks (StepFooterApi { revisited, onSkip } +
      StepChrome { pager, onDismiss, dismissLabel, disabled }); the app owns the
      reactive signin/connect body + CTA, rendering its own InteractionModal wired
      with that chrome. While an OAuth hand-off is in flight the CTA shows a
      connecting spinner and a quiet muted line reminds the user their browser is
      waiting; an already-connected app swaps its two-field body for a calm check
      + "Connected" and self-reports to advance (live frontier only). "Not now"
      travels WITH the CTA: the decline affordance is present wherever the CTA is
      (frontier AND a reconsidered skip), so no step is ever a dead end with only
      a Connect/Sign in button. Revisiting an already-reached signin/connect step
      (walked back via the pager) splits by its FINAL state: a COMPLETED step
      shows the calm connected/signed-in state with NO footer (the pager's forward
      chevron is the only way onward, since its card cannot re-fire completion); a
      SKIPPED step is still actionable, so its CTA (and its paired "Not now")
      return — letting the user RECONSIDER and connect / sign in after all, or
      decline again (the pager forward "keeps it skipped"). Revisiting a question
      pre-selects its prior answer (soft-grey fill); re-answering replaces it. A
      single question-with-options step keeps the one-tap feel (click = answer =
      complete). After the last step, emits each answered question in step order;
      the consumer encodes the structured interaction-answers message, appending
      the signed-in/connected status lines and the skipped-step facts derived
      from each step's FINAL outcome — a step skipped then reconsidered reports
      "Connected {app}." (never a stale "Skipped connecting {app}."), and no step
      is named twice. Disabled while another turn is active.
    a11y: one step announced at a time, its question read as the modal title; option rows are role=radio in a radiogroup, keyboard-selectable by the left number badge's position digit and visible at rest (no hover gate), showing label + optional Recommended chip only (no description); the free-text escape field (a bordered text input with a leading pencil adornment, no embedded control) is always present on question steps; the pager's Back/Forward chevrons and the dismiss X are labeled icon buttons; the footer's unified decline is a labeled button with an Esc keycap hint on every kind, and signin/connect add a labeled filled CTA (Enter fires it, Esc declines); the "N of M" pager copy is visible text.
    since: 4

  - id: interaction-approval-card
    title: Interaction approval card
    purpose: The approval STEP inside the interaction stepper, shown when an integration action needs the user's go-ahead before it runs; asks "Allow {app} to {action}?" and records allow-once / always-allow / deny.
    anatomy: [app-logo, integration-name, permission-question, param-rows, decided-state, footer-row, always-allow, deny, allow-once, return-key-glyph, decline-esc-hint]
    states: [frontier, with-params, no-params, decided-allowed, decided-denied, revisited, disabled]
    variants: [approval]
    behavior: >-
      An `approval` step (protocol `InteractionStep` kind=approval: `{toolkit,
      action, params, paramsHash}`) rides the SAME shared InteractionModal shell
      as the signin/connect steps (member of the interaction-card family,
      inventory v20). The host mints it: the sandbox execute route gates an
      integration `execute` and answers 409 `approval_required` with a
      display-ready payload; the runtime records the step on the turn holder
      (`recordApproval`, deduped by paramsHash, ids a1..aN, approvals LAST) and
      returns queued-pending text rather than an error. The app supplies the body
      via ui/chat's `renderApproval` prop (ui/chat stays Composio-unaware, exactly
      like renderConnect/renderSignin). The modal TITLE is the '(icon) NAME'
      identity lockup (real brand logo beside the integration name, REGULAR
      weight); the body leads with the permission question in foreground tone, then
      the tool's params as a two-column dt/dd block (muted key, foreground value —
      omitted when there are none). THREE decisions from the FOOTER: Always allow
      (outline, pushed LEFT), Deny (outline, Esc), Allow once (filled, Enter,
      return-key glyph). Unlike a connect/signin "Not now" (which merely defers),
      Deny is a real decision the model is TOLD about: resolution writes the store
      (allow-once → a one-shot ticket POST keyed by paramsHash; always-allow →
      the always-allow POST) then advances, and the composed reply names the RAW
      action slug ("Approved: go ahead with {ACTION}." / "I chose not to allow
      {ACTION}. Do not retry it; continue without it.") so the model can re-issue
      the EXACT call. Enter=allow-once / Esc=deny run capture-phase and are inert
      while a text field has focus (the real composer keeps its keys) and once the
      step is decided or disabled. The header X is NOT a Deny — it interrupts the
      WHOLE sequence (see interaction-card's dismiss semantics). A REVISITED
      already-decided step shows the calm decided state (check + "Allowed", or a
      muted "Denied") with NO footer; the pager's forward chevron is onward.
      Autopilot AUTO-APPROVES the gate (the runtime forwards `x-houston-turn-mode:
      auto`), so this card never appears on an auto turn.
    a11y: the permission question reads as the prominent line under the app-identity title; param rows are a dt/dd description list (muted key, foreground value); the three decisions are labeled footer buttons (Deny carries an Esc keycap hint, Allow once a return-key glyph); a revisited decided step exposes its outcome as text (no color-only), no footer.
    since: 21

  - id: plan-ready-card
    title: Plan-ready card
    purpose: In-chat surface shown when the agent finishes planning (plan mode) and calls plan_ready; presents the drafted plan and three ways forward as composer mode-menu rows, floating above the always-mounted composer (typing there instead abandons it).
    anatomy: [title, plan-summary, coworker-row, autopilot-row, keep-planning-row]
    states: [default, disabled]
    variants: [default]
    behavior: >-
      Rendered from a pending interaction carrying a single plan_ready step
      (summary), exactly like ask_user reaches the frontend. Shows the plan
      summary above three always-visible option rows built in the composer mode
      menu's idiom: each a full-width row with its icon inline with the title
      (Handshake / Rocket / ListTodo, matching the mode selector) and a
      one-line description below, rounded-xl hover background, nothing
      hover-gated. "Continue in Coworker mode" starts a normal (execute) turn
      confirming the plan; "Continue in Autopilot mode" starts an autopilot
      (auto) turn; both flip the composer Mode pill to match and send a visible
      user message. "Keep planning" dismisses the card LOCALLY (the composer
      returns, mode stays plan) without sending; a later, different plan
      re-shows the card. Primary emphasis comes from row order + title weight,
      not a filled button. Disabled gates all three rows.
    a11y: title then plan summary read in order; three labeled row buttons visible at rest (no hover gate), keyboard-reachable, each with a foreground-color icon inline with its title; disabled state marks the surface aria-disabled and gates every row.
    since: 9

  - id: suggest-reusable-card
    title: Suggest-reusable card
    purpose: In-chat offer shown when the agent finishes a mission cleanly and, in its end-of-task reflection step, calls suggest_reusable; proposes saving the just-completed work as a reusable Skill, a scheduled Routine, or a Learning to remember, floating above the always-mounted composer.
    anatomy: [eyebrow, proposed-title, rationale, save-row, not-now-row]
    states: [default, disabled]
    variants: [skill, routine, learning]
    behavior: >-
      Rendered from a pending interaction carrying a single suggest_reusable
      step (reusableKind, title, rationale) on the terminal done frame. Unlike
      every other interaction step, a lone suggest_reusable step keeps the
      mission's board status at done (the offer is optional, nothing is
      waiting). Shows the eyebrow, the model-proposed name prominently, and the
      model's one-line rationale, then two full-width rows in the plan-ready
      card's idiom: Save (Sparkles icon for a Skill, CalendarClock for a
      Routine, Lightbulb for a Learning; label names the kind) sends a
      follow-up message asking the agent to actually write the
      Skill/Routine/Learning, always as an execute turn regardless of the
      composer's pinned mode, dismissing the offer locally first; "Not now"
      dismisses locally. Typing in the composer instead abandons it like any
      interaction card. Dismissal is per-offer (step id) and per conversation.
    a11y: eyebrow then title then rationale read in order; two labeled row buttons visible at rest (no hover gate), keyboard-reachable; disabled marks the surface aria-disabled and gates both rows.
    since: 12

  - id: interaction-answers-message
    title: Interaction answers message
    purpose: The structured user-message bubble a completed question sequence sends; shows each question with its answer instead of a flat "question - answer" text blob.
    anatomy: [bubble-frame, question-line, answer-line, pair-divider]
    states: [default, single-pair]
    variants: [questions-only, mixed-with-confirmations]
    behavior: >-
      A completed interaction card encodes its answers as a marker-prefixed
      user message (houston:interaction-answers) whose plain-text body is what
      the model reads, byte-identical to the pre-existing flat reply. The
      renderer decodes the marker and shows an ordered receipt inside one
      user-side bubble: each answered question as a small muted label with the
      user's answer directly below, successive pairs separated by a hairline
      divider for an even rhythm (a lone pair renders as a compact receipt
      with no divider); confirmation lines with no question (a connected app,
      a sign-in) render as a lone value line. Skipped questions emit no line.
      Malformed or empty payloads fall through to the plain-text bubble;
      connect/signin-only sequences stay hidden auto-continue messages and
      never render this bubble. Deliberately quieter than the interaction
      card, matching the user-bubble family.
    a11y: reads in document order as question-then-answer pairs; pass-through content only, no interactive elements, no hover-gated information.
    since: 12

  - id: deliverable-card
    title: Deliverable card
    purpose: A rendered mission deliverable (markdown output) for review.
    anatomy: [card-frame, markdown-body]
    states: [default]
    variants: [deliverable, user-feedback-bubble]
    behavior: Renders the deliverable markdown; feedback variant echoes the user's reply.
    a11y: article role; headings preserved from source markdown.
    since: 1

  - id: mission-card
    title: Mission card
    purpose: A board card representing one mission/conversation.
    anatomy: [avatar, title, status-chip, actions, drag-handle, select-checkbox]
    states: [resting, running, needs-you, error, selected, focused, dragging]
    variants: [board-card, archived-list-row]
    behavior: >-
      Running state shows the comet glow; approve moves to done. Drag/multi-select
      are surface-capability gated (pointer drag on desktop).
    a11y: article/button role; title as label; checkbox labeled; status not color-only.
    since: 1

  - id: mission-board
    title: Mission board
    purpose: The columned board that groups mission cards by status.
    anatomy: [column, column-header, card-list, empty-column-state, bulk-action-bar]
    states: [populated, empty, loading, dragging]
    variants: [multi-column-board, single-column-list]
    behavior: >-
      Columns map to mission statuses; cards move between columns on approve/drag.
      Bulk-action bar appears when cards are multi-selected.
    a11y: list/grid semantics per column; column headers labeled; DnD has non-pointer fallback.
    since: 1

  - id: mission-status-chip
    title: Mission status chip
    purpose: The shared status token (running / needs-you / done / error) used across surfaces.
    anatomy: [status-dot-or-icon, status-label]
    states: [running, needs-you, done, error, cancelled]
    variants: [dot-only, dot-with-label, badge]
    behavior: >-
      One canonical mapping from a mission RunStatus to indicator + label, reused
      by board cards, the approval list, and conversation rows.
    a11y: status conveyed as text/label, never color alone; running is announced.
    since: 1

  - id: routine-row
    title: Routine row
    purpose: >-
      A routine in the routines list -- schedule summary + next run (cron), or
      event summary + trigger status (event-driven).
    anatomy:
      [
        status-icon,
        name,
        schedule-or-event-summary,
        trigger-status-badge,
        next-fire,
        enabled-toggle,
        quick-actions-menu,
      ]
    states:
      [
        enabled,
        disabled,
        running,
        paused,
        last-run-failed,
        renaming,
        trigger-active,
        trigger-pending,
        trigger-paused,
        trigger-error,
      ]
    variants: [list-row, grid-card, schedule-driven, event-driven]
    behavior: >-
      Shows a humanized schedule summary + next fire time (cron routine) or a
      humanized event summary + live provisioning status badge (event-driven:
      active / pending / paused-disconnected / paused-revoked / error, with a
      one-click reconnect on a disconnected account). The toggle enables/disables
      the routine; the leading status icon reflects the live run state. The
      quick-actions menu renames inline and deletes behind a confirm dialog.
      The inline edit panel authors the wake mechanism: where the deployment
      supports event triggers it offers a plain-language "When should this
      happen?" choice (schedule / app event); otherwise it is schedule-only.
    a11y: >-
      listitem role; toggle labeled with the routine name; next-run/status as
      text; status never color-alone (icon shape + row text carry it); menu
      trigger always visible with an accessible label.
    since: 1

  - id: skill-row
    title: Skill row
    purpose: A skill in the Skills surface -- an installed tile or a community catalog row.
    anatomy: [icon, name, description, install-or-check]
    states: [available, installed, installing, error, editing]
    variants: [installed-tile, community-catalog-row]
    behavior: >-
      Community rows ride the shared catalog grammar (CatalogRow): the row body
      opens the skill's info modal, a ghost round + installs (spinner while in
      flight, a quiet check once installed). Installed skills are tiles in the
      consolidated strip above the Store / Custom skills tabs (CatalogShell);
      a tile opens the edit modal, whose footer carries Save/Cancel and the
      destructive Delete (confirm-gated). No separate skill-detail surface.
    a11y: tile/row are single labeled buttons beside a labeled install button, never nested; install state conveyed as text.
    since: 1

  - id: empty-state
    title: Empty state
    purpose: The shared "nothing here yet" surface -- title, description, optional action.
    anatomy: [title, description, optional-action]
    states: [default]
    variants: [with-action, text-only]
    behavior: Big title + description with one optional primary action; no icon-in-box.
    a11y: region labeled by the title; action is a labeled button.
    since: 1

  - id: toast
    title: Toast / notice
    purpose: Transient surfacing of an action's result or error (with report-bug affordance).
    anatomy: [message, optional-action, dismiss]
    states: [info, success, error, loading]
    variants: [plain, with-report-bug-action]
    behavior: >-
      Every user-initiated error must reach a toast carrying the real reason and
      a Report-bug action (beta no-silent-failure policy).
    a11y: status/alert role by severity; auto-dismiss pauses on focus/hover.
    since: 1

  - id: ai-provider-card
    title: AI provider row
    purpose: One AI provider in a browse surface (the AI models hub or a connect flow).
    anatomy: [brand-mark, name, model-count-and-cost-line, trailing-action]
    states: [available, connected, connecting, signing-out]
    variants: [hub-catalog-row, connect-flow-card]
    behavior: >-
      Connection state (connected / in-flight) comes from the shared
      provider-connections layer; the model count is derived from the hub
      catalog across the row's gateway ids. The hub-catalog-row variant is the
      shared catalog grammar (CatalogRow): the row BODY opens the provider
      detail modal, a ghost round + connects (a Cancel pill while that connect
      is in flight), and connected providers leave the grid for the
      consolidated Connected tile strip above the tabs (CatalogShell). The
      connect-flow-card variant (onboarding / migration / workspace setup)
      keeps the static card with a trailing Connect / Sign out action; nothing
      hover-only in either variant.
    a11y: two sibling buttons, never nested (row body + labeled install); Connect/+ carries the provider name; connected shown as dot + label or a labeled tile, not color alone.
    since: 2

  - id: ai-model-row
    title: AI model row
    purpose: One model in the AI hub directory or a provider's model list.
    anatomy: [lab-glyph, name, lab-name]
    states: [default]
    variants: [directory-grid-row, provider-modal-list-row]
    behavior: >-
      A unique cross-provider catalog model in the shared catalog grammar
      (CatalogRow): transparent at rest, the hover fill sweeping the full row.
      The whole row is one button that opens the model detail modal (models
      install via a provider offer inside it, so the row carries no +). The
      directory renders the responsive two-column CatalogGrid; the provider
      modal keeps a single column. Both sit under a control row of a search box
      + the AI provider / Good at / Cost / Memory facet comboboxes.
    a11y: single button role; model name + lab as the accessible label; no nested buttons.
    since: 2

  - id: ai-model-offer-row
    title: AI model offer row
    purpose: One provider's way to run a model in the model detail's "Get it through" list.
    anatomy: [provider-glyph, provider-name, pricing-or-subscription, action]
    states: [available, connecting, connected]
    variants: [connect-action, connected-opens-provider]
    behavior: >-
      Offers sort connected-first, then subscription, then cheapest input price.
      Connect drives the shared connections layer; a connected row opens the
      provider detail. Pricing vs "Included with subscription" comes from the offer.
    a11y: RowCard semantics; Connect is a labeled button; connected shown as dot + label.
    since: 2
