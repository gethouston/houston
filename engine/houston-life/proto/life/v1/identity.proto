syntax = "proto3";

// Public-plane Identity dialect — full body per Spec C₂ §3.4.
//
// Sub-phase B M5 Task B10 lands the proto; Task B14 wires the handler
// bodies in lifed against the anima-proxy crate.
//
// Naming: `IdentityEmpty` and `IdentitySessionRef` are used here instead
// of the bare `Empty` / `SessionRef` types defined in agent.proto, so the
// generated `life::v1` Rust module hosts unique types for each service.
// (See M5 plan task B10 step 1 footnote.)

package life.v1;

import "aios/v1/identifiers.proto";
import "google/protobuf/timestamp.proto";

service Identity {
  rpc Me(IdentityEmpty) returns (Account);
  rpc UpdateProfile(UpdateProfileReq) returns (Account);
  rpc ListSessions(ListSessionsReq) returns (SessionList);
  rpc RevokeSession(IdentitySessionRef) returns (IdentityEmpty);
}

message IdentityEmpty {}
message IdentitySessionRef { aios.v1.SessionId sid = 1; }

message Account {
  string user_id = 1;
  string handle = 2;
  string display_name = 3;
  string email = 4;
  string tier = 5;
  google.protobuf.Timestamp created_at = 6;
  Profile profile = 7;
}

message Profile {
  string bio = 1;
  bytes avatar_blob_ref = 2;
  map<string, string> preferences = 3;
}

message UpdateProfileReq { Profile profile = 1; }

message ListSessionsReq {
  bool include_closed = 1;
  uint32 limit = 2;
}

message SessionList { repeated SessionDescriptor sessions = 1; }

message SessionDescriptor {
  aios.v1.SessionId sid = 1;
  string project_id = 2;
  google.protobuf.Timestamp opened_at = 3;
  google.protobuf.Timestamp closed_at = 4;
  string label = 5;
}
