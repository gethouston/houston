packages:
  - "ui/*"
  - "app"
  - "packages/*"
  - "cloud/evals"

# Approve native build scripts (pnpm 10 blocks dependency postinstall by
# default). @sentry/cli's postinstall downloads the platform `sentry-cli`
# binary that `app/scripts/sentry-inject.mjs` + the release.yml Sentry upload
# steps invoke. Lives here, NOT in package.json's `pnpm` field — recent pnpm no
# longer reads that field ("The pnpm field in package.json is no longer read").
onlyBuiltDependencies:
  - "@sentry/cli"

# Security override (uuid <11.1.1 advisory): gaxios 6 and teeny-request 9
# (both pulled by @google-cloud/storage, which has no gaxios-7-based release
# yet) declare uuid ^9. Both only call the still-present `v4()` (multipart
# boundaries), so forcing the patched major is safe. Drop when
# @google-cloud/storage moves to gaxios >=7 (which dropped uuid entirely).
overrides:
  "gaxios>uuid": "^11.1.1"
  "teeny-request>uuid": "^11.1.1"
