packages:
  - "ui/*"
  - "app"
  - "mobile"
  - "packages/*"
  - "houston-relay"
  - "examples/*"
  # Shared TypeScript client/contract for the new TS engine, consumed by the
  # webapp. NOTE: packages/engine itself is intentionally NOT a pnpm member —
  # it is a self-contained Bun project (see packages/engine/README.md).
  - "packages/engine-client"

# Approve native build scripts (pnpm 10 blocks dependency postinstall by
# default). @sentry/cli's postinstall downloads the platform `sentry-cli`
# binary that `app/scripts/sentry-inject.mjs` + the release.yml Sentry upload
# steps invoke. Lives here, NOT in package.json's `pnpm` field — recent pnpm no
# longer reads that field ("The pnpm field in package.json is no longer read").
onlyBuiltDependencies:
  - "@sentry/cli"
