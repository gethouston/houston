procs:
  host:
    # Source repo-root .env.local (gitignored) first so local dev secrets —
    # e.g. COMPOSIO_API_KEY / HOUSTON_INTEGRATIONS_URL — reach the host
    # without living in a committed file or your shell profile.
    shell: "set -a; [ -f .env.local ] && . ./.env.local; set +a; pnpm dev:host"
  app:
    shell: pnpm dev:app
  # The cloud control plane (the local integrations-gateway stand-in that used
  # to run here as `gateway:`) moved out of this repository; run its dev server
  # from its own repo when exercising the production integrations path.
