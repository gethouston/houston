procs:
  host:
    # Source repo-root .env.local (gitignored) first so local dev secrets —
    # e.g. COMPOSIO_API_KEY / HOUSTON_INTEGRATIONS_URL — reach the host
    # without living in a committed file or your shell profile.
    shell: "set -a; [ -f .env.local ] && . ./.env.local; set +a; pnpm dev:host"
  app:
    shell: pnpm dev:app
  gateway:
    # A local stand-in for Houston's cloud host (dev stores, REAL Supabase
    # verification when CP_SUPABASE_JWKS_URL is set in .env.local): holds the
    # Composio platform key and serves /v1/integrations for the desktop host,
    # so `pnpm dev` can exercise the exact production integrations path. Its
    # dev script self-loads repo-root .env.local. Idle/keyless → harmless.
    shell: pnpm dev:gateway
