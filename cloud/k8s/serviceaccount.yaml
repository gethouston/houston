# Per-agent Kubernetes ServiceAccount, bound to a GCP service account via
# GKE Workload Identity.
#
# Cloud Plan §8: "Workload Identity" is the networking/identity row. Each agent
# pod runs as a distinct, least-privilege identity so that — even though the pod
# has outbound internet — it authenticates to GCP only as itself, never as the
# node. The agent gets a STABLE per-agent identity (also §3) this way.
#
# The keyless-proxy design (§5) means the agent holds NO real provider key. It
# also should hold no broad GCP power: this GSA is created by the SandboxManager
# with minimal/zero roles. It exists mainly so the metadata-server token the pod
# could mint is scoped to a harmless identity — and §2/networkpolicy.yaml blocks
# 169.254.169.254 outright as defense in depth.
#
# Placeholders the SandboxManager fills before apply:
#   {{AGENT_ID}}       the AgentId — names the KSA
#   {{WORKSPACE_NS}}   the workspace namespace
#   {{WORKSPACE_ID}}   owning workspace, for audit
#   {{GCP_SA}}         the bound GCP service account email,
#                      e.g. "agent-<id>@<project>.iam.gserviceaccount.com"
apiVersion: v1
kind: ServiceAccount
metadata:
  name: "agent-{{AGENT_ID}}"
  namespace: "{{WORKSPACE_NS}}"
  labels:
    houston.ai/agent-id: "{{AGENT_ID}}"
    houston.ai/workspace-id: "{{WORKSPACE_ID}}"
    houston.ai/component: agent-identity
  annotations:
    # The Workload Identity binding: KSA -> GSA. GKE exchanges this KSA's token
    # for the GSA's credentials at the metadata server. The GSA itself is created
    # with no broad roles, so a compromised agent gains nothing useful.
    iam.gke.io/gcp-service-account: "{{GCP_SA}}"
