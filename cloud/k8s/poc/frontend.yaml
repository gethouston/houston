apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: houston-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: houston/frontend:local
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 80, name: http }
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 200m, memory: 128Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: houston-system
spec:
  selector:
    app: frontend
  ports:
    - { name: http, port: 80, targetPort: 80 }
