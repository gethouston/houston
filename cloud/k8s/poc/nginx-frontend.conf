server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — every non-file path serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable caching of the entrypoint so a redeploy is picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
