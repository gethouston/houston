# The Houston control plane itself: auth + workspace/agent storage + per-agent
# sandbox lifecycle + routing/SSE + keyless proxy. Deployed into `houston-system`.
#
# The Supabase DB URL + sandbox-token secret are NOT here — they are created
# imperatively from .context/cloud.env at deploy time (never committed):
#   kubectl -n houston-system create secret generic control-plane-secrets \
#     --from-literal=database-url="$CP_DATABASE_URL" \
#     --from-literal=sandbox-token-secret="$(openssl rand -hex 32)"
apiVersion: v1
kind: Namespace
metadata:
  name: houston-system
  labels:
    houston.ai/component: control-plane
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: control-plane
  namespace: houston-system
---
# The control plane creates per-agent namespaces + workloads on demand, so it
# needs cluster-wide rights over exactly the resources its SandboxManager touches.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: houston-control-plane
rules:
  - apiGroups: [""]
    resources: [namespaces, services, persistentvolumeclaims, secrets, pods]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [apps]
    # deployments/scale is a SEPARATE RBAC resource from deployments — the
    # SandboxManager patches it to wake a slept sandbox, so it must be granted
    # explicitly or the scale patch 403s.
    resources: [deployments, deployments/scale]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [networking.k8s.io]
    resources: [networkpolicies]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: houston-control-plane
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: houston-control-plane
subjects:
  - kind: ServiceAccount
    name: control-plane
    namespace: houston-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: houston-system
  labels:
    houston.ai/component: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: control-plane
  template:
    metadata:
      labels:
        app: control-plane
        houston.ai/component: control-plane
    spec:
      serviceAccountName: control-plane
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: control-plane
          image: us-east1-docker.pkg.dev/gethouston/houston/control-plane:v2
          ports:
            - { containerPort: 8080, name: api }
            - { containerPort: 8081, name: proxy }
          env:
            - { name: CP_HOST, value: "0.0.0.0" }
            - { name: CP_PORT, value: "8080" }
            - { name: CP_PROXY_PORT, value: "8081" }
            # The per-agent sandbox image + how the SandboxManager schedules pods.
            - { name: CP_AGENT_IMAGE, value: "us-east1-docker.pkg.dev/gethouston/houston/runtime:v2" }
            - { name: CP_NAMESPACE_PREFIX, value: "ws-" }
            # Empty for the first deploy (no gVisor): agent pods get standard
            # per-pod + per-volume + NetworkPolicy isolation. gVisor/Kata later.
            - { name: CP_RUNTIME_CLASS, value: "" }
            # Supabase token verification (asymmetric ES256 → JWKS, no secret).
            - { name: CP_SUPABASE_JWKS_URL, value: "https://zfpnlvxazrataiannvtq.supabase.co/auth/v1/.well-known/jwks.json" }
            - { name: CP_SUPABASE_JWT_ISSUER, value: "https://zfpnlvxazrataiannvtq.supabase.co/auth/v1" }
            # Keyless proxy upstream (the workspace's real key is injected here).
            - { name: CP_PROXY_UPSTREAM, value: "https://api.anthropic.com" }
            - { name: CP_PROXY_PROVIDER, value: "anthropic" }
            # In-cluster address agent sandboxes call for keyless AI (this proxy).
            - { name: CP_SANDBOX_PROXY_URL, value: "http://control-plane-proxy.houston-system.svc.cluster.local:8081" }
            # Central beta provider key — optional until the first chat message.
            - name: CP_ANTHROPIC_KEY
              valueFrom:
                secretKeyRef: { name: control-plane-secrets, key: anthropic-key, optional: true }
            # Secrets (created imperatively — see header).
            - name: CP_DATABASE_URL
              valueFrom:
                secretKeyRef: { name: control-plane-secrets, key: database-url }
            - name: CP_SANDBOX_TOKEN_SECRET
              valueFrom:
                secretKeyRef: { name: control-plane-secrets, key: sandbox-token-secret }
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: 250m, memory: 256Mi }
            limits: { cpu: "1", memory: 512Mi }
---
# External entry point the frontend talks to (API on 8080, exposed on :80).
apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: houston-system
  labels:
    houston.ai/component: control-plane
spec:
  type: LoadBalancer
  selector:
    app: control-plane
  ports:
    - { name: api, port: 80, targetPort: 8080 }
---
# In-cluster address the agent sandboxes use to reach the keyless proxy.
apiVersion: v1
kind: Service
metadata:
  name: control-plane-proxy
  namespace: houston-system
spec:
  type: ClusterIP
  selector:
    app: control-plane
  ports:
    - { name: proxy, port: 8081, targetPort: 8081 }
