apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: houston-poc
type: Opaque
stringData:
  POSTGRES_DB: houston
  POSTGRES_USER: houston
  POSTGRES_PASSWORD: houston-poc
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: houston-poc
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: [pg_isready, -U, houston, -d, houston]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: houston-poc
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
