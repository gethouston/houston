name: Host Engine Release

# Builds the standalone Houston HOST binary — the bun-compiled TypeScript engine —
# for bare-metal / self-host use. This is the SAME self-contained binary the
# desktop app embeds as its sidecar (scripts/build-host-sidecar.sh) and the one a
# `selfhost/` operator can run directly instead of the Docker image. Replaces the
# legacy Rust `houston-engine` build. Fires on an `engine-v*` tag or manually.
#
# ONE binary, TWO roles (packages/host/src/sidecar-entry.ts): it runs as the
# local HOST by default, or as a pi RUNTIME when HOUSTON_SIDECAR_ROLE=runtime (the
# host spawns itself in runtime mode). `bun build --compile` embeds the Bun
# runtime, so the binary needs no bun/node installed to run. No provider CLIs are
# bundled — pi talks to providers in-process.

on:
  push:
    tags:
      - "engine-v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  # Same Bun pin the desktop release (release.yml) uses, so every compiled host
  # binary is byte-reproducible regardless of which workflow built it.
  BUN_VERSION: "1.3.10"

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native legs — `--verify` boots the binary and curls /v1/capabilities.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            verify: "--verify"
            sdk_slug: linux-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            verify: "--verify"
            sdk_slug: darwin-arm64
          # Cross legs — Bun links its own libc, so same-OS cross-arch compiles,
          # but the binary can't boot on this runner, so no `--verify`.
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            verify: ""
            sdk_slug: linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            verify: ""
            sdk_slug: darwin-x64
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      # build-host-sidecar.sh bun-bundles packages/host/src/sidecar-entry.ts,
      # which imports across the workspace — so node_modules must exist first.
      - name: Install dependencies
        run: pnpm install

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      # `pnpm install` resolves only the runner-native Claude SDK platform
      # package, but build-host-sidecar.sh must embed the TARGET's binary —
      # cross legs fail without it in the store. Same force-install (and SDK
      # version pin source) as release.yml's universal-macOS step. Edits only
      # the runner's checkout; no-op when already present.
      - name: Force-install the target's Claude SDK platform package
        run: |
          set -euo pipefail
          SDK_VER=$(jq -r '.dependencies["@anthropic-ai/claude-agent-sdk"] // .optionalDependencies["@anthropic-ai/claude-agent-sdk"] // ""' packages/runtime/package.json)
          if [ -z "$SDK_VER" ] || [ "$SDK_VER" = "null" ]; then
            echo "ERROR: @anthropic-ai/claude-agent-sdk is not pinned in packages/runtime/package.json (.dependencies or .optionalDependencies)" >&2
            exit 1
          fi
          echo "Claude Agent SDK version pinned by packages/runtime: $SDK_VER"
          pnpm add -w "@anthropic-ai/claude-agent-sdk-${{ matrix.sdk_slug }}@$SDK_VER" --force

      - name: Compile Houston host binary (${{ matrix.target }})
        run: |
          set -euo pipefail
          scripts/build-host-sidecar.sh ${{ matrix.target }} ${{ matrix.verify }}

      - name: Package
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/host-sidecar/houston-host-${{ matrix.target }}" \
            "dist/houston-host-${{ matrix.target }}"
          chmod +x "dist/houston-host-${{ matrix.target }}"
          ls -lah dist/

      - uses: actions/upload-artifact@v7
        with:
          name: houston-host-${{ matrix.target }}
          path: dist/*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
