# Engine Pod Image — build + push to Artifact Registry
#
# The engine-pod image is the managed-cloud profile of the SAME engine the free
# desktop app runs (selfhost/Dockerfile --target engine-pod). This repo is its
# single source of truth; the private gateway repo (gethouston/cloud) only
# REFERENCES the published image, pinning GW_ENGINE_IMAGE to an immutable
# per-commit tag from here.
#
# Publishes two tags per build:
#   engine-pod:<git-sha>  — immutable; what the gateway should pin.
#   engine-pod:poc        — moving pointer to the latest POC build (convenience).
#
# ── GCP auth: Workload Identity Federation ────────────────────────────────────
#   SA: github-deploy@gethouston.iam.gserviceaccount.com
#   The WIF provider's attribute condition MUST allow this repo
#   (gethouston/houston-web) to impersonate the SA, and the SA needs Artifact
#   Registry Writer on the `houston` repo. If the existing pool is locked to the
#   cloud repo, add a binding for this repo (or give this repo its own provider).

name: Engine Pod Image

on:
  push:
    # poc/engine-pod-image is here only to debug the pipeline on the branch —
    # remove it before merging so the image publishes from main alone. (Editing
    # this workflow file triggers a run via the paths filter below; for ad-hoc
    # debug runs use the workflow_dispatch button.)
    branches: [main, poc/engine-pod-image]
    paths:
      - "selfhost/Dockerfile"
      - "packages/protocol/**"
      - "packages/runtime-client/**"
      - "packages/domain/**"
      - "packages/runtime/**"
      - "packages/host/**"
      - "ui/agent-schemas/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/engine-pod-image.yml"
  workflow_dispatch:

concurrency:
  group: engine-pod-image
  cancel-in-progress: false

env:
  GCP_PROJECT: gethouston
  REGION: us-east1
  REGISTRY: us-east1-docker.pkg.dev/gethouston/houston

jobs:
  build:
    name: Build & push engine-pod
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write # Workload Identity Federation
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1056698080170/locations/global/workloadIdentityPools/github/providers/houston
          service_account: github-deploy@gethouston.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push engine-pod
        id: build
        run: |
          SHA_TAG="${{ env.REGISTRY }}/engine-pod:${{ github.sha }}"
          POC_TAG="${{ env.REGISTRY }}/engine-pod:poc"
          docker build \
            --platform linux/amd64 \
            --target engine-pod \
            -f selfhost/Dockerfile \
            -t "$SHA_TAG" -t "$POC_TAG" \
            .
          docker push "$SHA_TAG"
          docker push "$POC_TAG"
          # Resolve the immutable digest of the pushed image for the pin below.
          DIGEST=$(gcloud artifacts docker images describe "$SHA_TAG" \
            --format='value(image_summary.digest)')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Published tags
        run: |
          echo "Published:"
          echo "  ${{ env.REGISTRY }}/engine-pod:${{ github.sha }}"
          echo "  ${{ env.REGISTRY }}/engine-pod:poc"
          echo "  digest ${{ steps.build.outputs.digest }}"

  # Auto-CD: bump the gateway's pinned engine digest on main, which fires the
  # gateway deploy (gethouston/cloud deploys on push to main). Git stays the single
  # source of truth for the deployed engine version — no dispatch, no divergence.
  # Only main publishes to the hosted POC; debug-branch builds just push the image.
  # NB: only NEW per-user pods pick up the new engine; existing users keep theirs
  # until their namespace is recreated.
  bump-gateway:
    name: Bump gateway engine pin
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout gethouston/cloud
        uses: actions/checkout@v4
        with:
          repository: gethouston/cloud
          # PAT / GitHub App token with contents:write on gethouston/cloud.
          token: ${{ secrets.CLOUD_REPO_TOKEN }}

      - name: Bump GW_ENGINE_IMAGE to the new digest
        run: |
          DIGEST="${{ needs.build.outputs.digest }}"   # sha256:...
          FILE=.github/workflows/deploy-poc.yml
          sed -i -E "s|(engine-pod@)sha256:[a-f0-9]+|\1${DIGEST}|" "$FILE"
          if git diff --quiet -- "$FILE"; then
            echo "Pin already at ${DIGEST} — nothing to do."
            exit 0
          fi
          git config user.name  "houston-ci"
          git config user.email "ci@gethouston.ai"
          git add "$FILE"
          git commit -m "ci: roll engine-pod to ${DIGEST}"
          git push origin HEAD:main
