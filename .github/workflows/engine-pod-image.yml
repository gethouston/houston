# Engine Pod Image — build + push to Artifact Registry
#
# The engine-pod image is the managed-cloud profile of the SAME engine the free
# desktop app runs (selfhost/Dockerfile --target engine-pod). This repo is its
# single source of truth.
#
# This workflow ONLY builds and publishes the image. It does NOT touch the GKE
# cluster: this repo is public, and a compromised third-party Action or
# dependency here must not be able to reach production. The actual roll (update
# gateway-config ConfigMap + restart the gateway) happens in the private
# gethouston/cloud repo (.github/workflows/roll-engine.yml there), triggered by
# the repository_dispatch fired below. That handoff is the trust boundary.
#
# Publishes two tags per build:
#   engine-pod:<git-sha>  — immutable, by-digest reference used for the roll.
#   engine-pod:poc        — moving pointer to the latest POC build (convenience).
#
# ── GCP auth: Workload Identity Federation ────────────────────────────────────
#   SA: github-deploy-engine@gethouston.iam.gserviceaccount.com — Artifact Registry
#   Writer ONLY (no cluster role). The WIF provider condition must restrict this
#   binding to attribute.repository=='gethouston/houston' — do NOT reuse the
#   broader github-deploy@gethouston.iam.gserviceaccount.com SA used by cloud's
#   workflows, which also carries Kubernetes Engine Developer.
#
# ── Required GitHub secret ─────────────────────────────────────────────────────
#   CLOUD_DISPATCH_TOKEN — fine-grained PAT scoped ONLY to gethouston/cloud, with
#   the minimum permission GitHub requires for the repository_dispatch endpoint.
#   Used solely to notify cloud that a new image is ready; carries no GCP access.

name: Engine Pod Image

on:
  push:
    branches: [main]
    paths:
      - "selfhost/Dockerfile"
      - "packages/protocol/**"
      - "packages/runtime-client/**"
      - "packages/domain/**"
      - "packages/runtime/**"
      - "packages/host/**"
      - "ui/agent-schemas/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/engine-pod-image.yml"
  workflow_dispatch:

concurrency:
  group: engine-pod-image
  cancel-in-progress: false

env:
  GCP_PROJECT: gethouston
  REGION: us-east1
  REGISTRY: us-east1-docker.pkg.dev/gethouston/houston

jobs:
  build:
    name: Build & push engine-pod
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write # Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1056698080170/locations/global/workloadIdentityPools/github/providers/houston
          service_account: github-deploy-engine@gethouston.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push engine-pod
        id: build
        run: |
          SHA_TAG="${{ env.REGISTRY }}/engine-pod:${{ github.sha }}"
          POC_TAG="${{ env.REGISTRY }}/engine-pod:poc"
          docker build \
            --platform linux/amd64 \
            --target engine-pod \
            -f selfhost/Dockerfile \
            -t "$SHA_TAG" -t "$POC_TAG" \
            .
          docker push "$SHA_TAG"
          docker push "$POC_TAG"
          # Resolve the immutable digest of the pushed image for the roll below.
          DIGEST=$(gcloud artifacts docker images describe "$SHA_TAG" \
            --format='value(image_summary.digest)')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Published tags
        run: |
          echo "Published:"
          echo "  ${{ env.REGISTRY }}/engine-pod:${{ github.sha }}"
          echo "  ${{ env.REGISTRY }}/engine-pod:poc"
          echo "  digest ${{ steps.build.outputs.digest }}"

      # Notify cloud that a new engine-pod image is ready — cloud owns the
      # cluster credentials and performs the actual roll. Only on main: a
      # workflow_dispatch on a debug branch just publishes the image.
      - name: Notify cloud repo
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.CLOUD_DISPATCH_TOKEN }}
        run: |
          IMAGE="${{ env.REGISTRY }}/engine-pod@${{ steps.build.outputs.digest }}"
          gh api repos/gethouston/cloud/dispatches \
            -f event_type='engine-pod-published' \
            -F "client_payload[digest]=${{ steps.build.outputs.digest }}" \
            -F "client_payload[image]=$IMAGE" \
            -F "client_payload[sha]=${{ github.sha }}" \
            -F "client_payload[run_number]=${{ github.run_number }}"
