# Engine Pod Image — build + push to Artifact Registry
#
# The engine-pod image is the managed-cloud profile of the SAME engine the free
# desktop app runs (selfhost/Dockerfile --target engine-pod). This repo is its
# single source of truth.
#
# This workflow ONLY builds and publishes the image. It does NOT touch the GKE
# cluster: this repo is public, and a compromised third-party Action or
# dependency here must not be able to reach production. The actual roll (update
# gateway-config ConfigMap + restart the gateway) happens in the private
# gethouston/cloud repo (.github/workflows/roll-engine.yml there), triggered by
# the repository_dispatch fired below. That handoff is the trust boundary.
#
# Two triggers, two audiences:
#   - push to main (paths-filtered in "Determine whether to build" below):
#     continuous build → dispatches engine-pod-published →
#     cloud/roll-engine-staging.yml rolls staging.
#   - push of an engine-pod-v* tag (no path filter — the tag means "ship
#     this", and combining paths with a tags trigger is unreliable in GitHub
#     Actions, since a tag push often carries no commit list to diff against):
#     dispatches engine-pod-published-prod → cloud/roll-engine.yml rolls prod.
# The tag pattern is deliberately NARROW: this repo's tag namespace already
# carries other release trains — v*/cloud-v* (desktop, release.yml),
# cloud-latest (a MOVING pointer that gets re-pushed), ios-v* (TestFlight),
# engine-v* (self-host host binary, engine-release.yml). Each train versions
# independently; only engine-pod-v* may roll the prod engine fleet.
# The path-relevance check for the main-branch case moved from the `on:`
# trigger into the "Determine whether to build" step below, since GitHub
# Actions applies one `paths:` filter to the whole push trigger regardless of
# which ref pattern (branches vs tags) matched — it can't be tag-exempt at
# the trigger level.
#
# Publishes two tags per build:
#   engine-pod:<git-sha>  — immutable, by-digest reference used for the roll.
#   engine-pod:poc        — moving pointer to the latest POC build (convenience).
#
# ── GCP auth: Workload Identity Federation ────────────────────────────────────
#   SA: github-deploy-engine@gethouston.iam.gserviceaccount.com — Artifact Registry
#   Writer ONLY (no cluster role). The WIF provider condition must restrict this
#   binding to attribute.repository=='gethouston/houston' — do NOT reuse the
#   broader github-deploy@gethouston.iam.gserviceaccount.com SA used by cloud's
#   workflows, which also carries Kubernetes Engine Developer.
#
# ── Required GitHub secret ─────────────────────────────────────────────────────
#   CLOUD_DISPATCH_TOKEN — fine-grained PAT scoped ONLY to gethouston/cloud, with
#   the minimum permission GitHub requires for the repository_dispatch endpoint.
#   Used solely to notify cloud that a new image is ready; carries no GCP access.

name: Engine Pod Image

on:
  push:
    branches: [main]
    tags: ["engine-pod-v*"]
  workflow_dispatch:

concurrency:
  group: engine-pod-image
  cancel-in-progress: false

env:
  GCP_PROJECT: gethouston
  REGION: us-east1
  REGISTRY: us-east1-docker.pkg.dev/gethouston/houston

jobs:
  build:
    name: Build & push engine-pod
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write # Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      # An engine-pod-v* tag or a manual dispatch always builds (the tag IS
      # the release decision; no other tag pattern reaches this workflow).
      # A push to main only builds when it touched a relevant path
      # — this replaces the old trigger-level `paths:` filter, which can't
      # apply to branch pushes only once the trigger also matches tags.
      #
      # Diffs github.event.before (main's tip BEFORE this push) against the
      # new HEAD, NOT just HEAD^ — a single push can carry several commits
      # (e.g. a non-squash merge), and diffing only the last commit against
      # its immediate parent would miss relevant paths touched by an EARLIER
      # commit in the same push. `before` isn't guaranteed to be present in
      # the shallow clone actions/checkout leaves behind, so it's fetched on
      # demand; if that fetch fails (or before is the all-zeros SHA GitHub
      # sends for a branch's first-ever push), fail open and build anyway —
      # a wasted build is cheap, a silently skipped release isn't.
      - name: Determine whether to build
        id: gate
        run: |
          if [ "${{ github.ref_type }}" = "tag" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASE="${{ github.event.before }}"
          BUILD=true
          if [ -n "$BASE" ] && [ "$BASE" != "0000000000000000000000000000000000000000" ] \
              && git fetch --depth=1 origin "$BASE" 2>/dev/null; then
            if git diff --name-only "$BASE" "${{ github.sha }}" -- \
                selfhost/Dockerfile packages/protocol packages/runtime-client \
                packages/domain packages/runtime packages/host ui/agent-schemas \
                pnpm-lock.yaml .github/workflows/engine-pod-image.yml | grep -q .; then
              BUILD=true
            else
              BUILD=false
            fi
          fi
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"

      - name: Auth to GCP
        if: steps.gate.outputs.build == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1056698080170/locations/global/workloadIdentityPools/github/providers/houston
          service_account: github-deploy-engine@gethouston.iam.gserviceaccount.com

      - name: Set up gcloud
        if: steps.gate.outputs.build == 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        if: steps.gate.outputs.build == 'true'
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push engine-pod
        id: build
        if: steps.gate.outputs.build == 'true'
        run: |
          SHA_TAG="${{ env.REGISTRY }}/engine-pod:${{ github.sha }}"
          POC_TAG="${{ env.REGISTRY }}/engine-pod:poc"
          # SENTRY_DSN bakes crash reporting into the managed fleet (empty on
          # forks → the engine stays dormant); the release ties events to the
          # exact image commit. Not a cluster credential — the same DSN ships
          # inside the public desktop binaries.
          docker build \
            --platform linux/amd64 \
            --target engine-pod \
            --build-arg "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" \
            --build-arg "SENTRY_RELEASE=engine-pod@${{ github.sha }}" \
            --build-arg "BUILD_SHA=${{ github.sha }}" \
            -f selfhost/Dockerfile \
            -t "$SHA_TAG" -t "$POC_TAG" \
            .
          docker push "$SHA_TAG"
          docker push "$POC_TAG"
          # Resolve the immutable digest of the pushed image for the roll below.
          DIGEST=$(gcloud artifacts docker images describe "$SHA_TAG" \
            --format='value(image_summary.digest)')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Published tags
        if: steps.gate.outputs.build == 'true'
        run: |
          echo "Published:"
          echo "  ${{ env.REGISTRY }}/engine-pod:${{ github.sha }}"
          echo "  ${{ env.REGISTRY }}/engine-pod:poc"
          echo "  digest ${{ steps.build.outputs.digest }}"

      # ── Engine-pod catalog artifact ──────────────────────────────────────────
      # The gateway (private gethouston/cloud) serves GET /v1/catalog to the app's
      # model picker from an EMBEDDED snapshot that used to be hand-regenerated and
      # drifted — users saw a week-old catalog. Fix: every engine image build ALSO
      # publishes the catalog it serves as a tiny sibling image, and cloud's roll
      # workflows (roll-engine.yml / roll-engine-staging.yml) fetch it by the SAME
      # <git-sha> they roll and serve it live. The engine image is the single
      # source of truth; the gateway can never drift from the fleet again. This
      # MUST run before "Notify cloud repo" so the roll can always fetch the
      # catalog by the dispatched sha, and it MUST fail the build (never skip) when
      # the catalog can't be produced — a silent skip resurrects the drift.
      #
      # We obtain the catalog by BOOTING the just-built engine-pod image and
      # curling the real /v1/catalog — not by re-deriving it — so the artifact is
      # byte-for-byte what the fleet serves, and a bundle that can't answer the
      # route fails HERE instead of in users' pickers. (Re-deriving via a dump
      # script was rejected: the shipped image ships an esbuild bundle with no TS
      # runner in its --prod deps, so it couldn't run a source-level dumper without
      # a second bundle that would itself drift from the route.) Boot is safe with
      # one dummy token: the managed-cloud credential/store gateway env is absent
      # here → those configs no-op (packages/host/src/local/main.ts), eager-runtime
      # is a no-op on the empty /data (no stored agents), and /v1/catalog is public
      # (served before the auth gate) from pi-ai's static in-process registry — no
      # network, no DB, not user-scoped.
      - name: Produce & push engine-pod-catalog artifact
        id: catalog
        if: steps.gate.outputs.build == 'true'
        run: |
          set -euo pipefail
          SHA_TAG="${{ env.REGISTRY }}/engine-pod:${{ github.sha }}"
          PORT=4318
          mkdir -p catalog-image

          # Boot the pod. /v1/catalog needs no token, but HOUSTON_HOST_TOKEN is
          # required for the host to start at all (an unset token would leave the
          # 0.0.0.0-bound port open). No --rm, so logs survive a crash for diag.
          CID=$(docker run -d \
            -e HOUSTON_HOST_TOKEN=ci-catalog-probe \
            -p 127.0.0.1:${PORT}:4318 \
            "$SHA_TAG")
          cleanup() { docker rm -f "$CID" >/dev/null 2>&1 || true; }
          trap cleanup EXIT

          # Wait up to 60s for /health (public, no token) to answer 200. Bail
          # early — with logs — if the container dies before becoming ready.
          ready=""
          for _ in $(seq 1 120); do
            if curl -fsS "http://127.0.0.1:${PORT}/health" >/dev/null 2>&1; then
              ready=1; break
            fi
            if [ -z "$(docker ps -q --no-trunc --filter "id=$CID")" ]; then
              echo "ERROR: engine-pod container exited before becoming ready" >&2
              docker logs "$CID" 2>&1 || true
              exit 1
            fi
            sleep 0.5
          done
          if [ -z "$ready" ]; then
            echo "ERROR: engine-pod did not become ready within 60s" >&2
            docker logs "$CID" 2>&1 || true
            exit 1
          fi

          # The real body the fleet serves. -f fails the step on any non-200.
          curl -fsS "http://127.0.0.1:${PORT}/v1/catalog" -o catalog-image/catalog.json

          # Fail loudly on anything that would resurrect the stale/empty catalog:
          # not a JSON array, empty, or missing a known-stable provider.
          jq -e 'type == "array" and length > 0' catalog-image/catalog.json >/dev/null \
            || { echo "ERROR: /v1/catalog is not a non-empty JSON array" >&2; head -c 400 catalog-image/catalog.json >&2; exit 1; }
          jq -e 'any(.[]; .id == "anthropic")' catalog-image/catalog.json >/dev/null \
            || { echo "ERROR: /v1/catalog is missing the anthropic provider — suspect a broken/partial registry" >&2; exit 1; }
          echo "catalog.json OK: $(jq 'length' catalog-image/catalog.json) providers, $(wc -c < catalog-image/catalog.json) bytes"

          # Publish as a FROM-scratch sibling image at the SAME <git-sha> tag as
          # engine-pod above, one file at /catalog.json. cloud's roll workflow
          # pulls this by the dispatched sha and extracts /catalog.json to serve.
          # (The WIF SA's "Artifact Registry Writer" on this repo path already
          # covers the engine-pod-catalog repo — same registry/repo prefix.) Built
          # from the tiny catalog-image/ dir so the build context is one file.
          CATALOG_TAG="${{ env.REGISTRY }}/engine-pod-catalog:${{ github.sha }}"
          printf 'FROM scratch\nCOPY catalog.json /catalog.json\n' > catalog-image/Dockerfile
          docker build --platform linux/amd64 -f catalog-image/Dockerfile -t "$CATALOG_TAG" catalog-image
          docker push "$CATALOG_TAG"
          echo "Published: $CATALOG_TAG"

      # Notify cloud that a new engine-pod image is ready — cloud owns the
      # cluster credentials and performs the actual roll. A tag push notifies
      # prod (engine-pod-published-prod); a push to main notifies staging
      # (engine-pod-published, unchanged). A workflow_dispatch on a debug
      # branch/no ref just publishes the image, same as before.
      - name: Notify cloud repo
        if: steps.gate.outputs.build == 'true' && (github.ref_type == 'tag' || github.ref == 'refs/heads/main')
        env:
          GH_TOKEN: ${{ secrets.CLOUD_DISPATCH_TOKEN }}
        run: |
          IMAGE="${{ env.REGISTRY }}/engine-pod@${{ steps.build.outputs.digest }}"
          EVENT_TYPE="engine-pod-published"
          [ "${{ github.ref_type }}" = "tag" ] && EVENT_TYPE="engine-pod-published-prod"
          gh api repos/gethouston/cloud/dispatches \
            -f event_type="$EVENT_TYPE" \
            -F "client_payload[digest]=${{ steps.build.outputs.digest }}" \
            -F "client_payload[image]=$IMAGE" \
            -F "client_payload[sha]=${{ github.sha }}" \
            -F "client_payload[run_number]=${{ github.run_number }}"
