# Manual TS-engine container image publisher.
#
# This builds the open self-host/managed-pod image from selfhost/Dockerfile's
# `engine-pod` target. It is intentionally dispatch-only: no push, tag, or PR
# trigger, so `main` changes never publish an image unless a human presses Run.

name: TS Engine Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional extra image tag, for example v0.4.19-pod. The commit SHA tag is always published."
        required: false
        type: string
      publish_latest:
        description: "Also move ghcr.io/gethouston/houston-engine-pod:latest to this build."
        required: true
        type: boolean
        default: true

concurrency:
  group: ts-engine-image-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/gethouston/houston-engine-pod

jobs:
  publish:
    name: Build and publish engine pod image
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=${{ inputs.image_tag }},enable=${{ inputs.image_tag != '' }}
            type=raw,value=latest,enable=${{ inputs.publish_latest }}
          labels: |
            org.opencontainers.image.title=Houston TS Engine Pod
            org.opencontainers.image.description=Houston TypeScript host/runtime managed engine pod image
            org.opencontainers.image.source=https://github.com/gethouston/houston-web

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: selfhost/Dockerfile
          target: engine-pod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Verify pushed manifest
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          image_ref="$(printf '%s\n' "${IMAGE_TAGS}" | grep ':sha-' | head -n 1 || true)"
          if [[ -z "${image_ref}" ]]; then
            echo "No sha-* tag found in metadata output"
            exit 1
          fi
          echo "Inspecting ${image_ref}"
          for attempt in {1..6}; do
            if docker buildx imagetools inspect "${image_ref}" > /tmp/engine-pod-manifest.txt; then
              break
            fi
            if [[ "${attempt}" == "6" ]]; then
              echo "Manifest not readable after ${attempt} attempts"
              exit 1
            fi
            sleep 10
          done
          cat /tmp/engine-pod-manifest.txt
          grep -q "Platform:.*linux/amd64" /tmp/engine-pod-manifest.txt || {
            echo "Missing linux/amd64 manifest"
            exit 1
          }
          grep -q "Platform:.*linux/arm64" /tmp/engine-pod-manifest.txt || {
            echo "Missing linux/arm64 manifest"
            exit 1
          }

      - name: Print image digest
        run: |
          echo "Published ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"
          echo "Tags:"
          echo "${{ steps.meta.outputs.tags }}"
