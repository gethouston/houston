# Houston PR CI Gate
#
# Fast, hermetic, secret-free TypeScript gate that runs on every pull request
# targeting `main`. This is the keystone that lets us safely delete the legacy
# Rust engine later: if these checks are green, the convergence (pi runtime +
# host) TS path is type-correct, lint-clean, boundary-clean, and its contract
# suites pass.
#
# Two jobs run in parallel:
#   - checks: the TS convergence gate (lint · typecheck · contract tests).
#   - web:    the Houston Web typecheck + unit + Playwright UI tests (the full
#             desktop UI driven in a browser on the new TS engine, against an
#             in-memory fake host). See packages/web/e2e/README.md.
#
# Deliberately NOT here (belongs in release CI — too slow / heavy system deps):
#   - the Tauri app-shell Rust build (app/src-tauri)
#   - the legacy Rust engine build/tests (engine/)
#   - macOS signing / notarization
#
# Toolchain note — TWO package managers:
#   - pnpm owns the root workspace (ui/*, app, packages/domain, packages/web, …).
#   - Bun owns the self-contained services that are INTENTIONALLY excluded from
#     the pnpm workspace (see pnpm-workspace.yaml): packages/runtime and
#     packages/host. They carry their own bun.lock and must be
#     installed + typechecked + tested directly with Bun. `pnpm -r` never
#     reaches them, so they get explicit steps below.

name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches: [main]
  workflow_dispatch:

# One in-flight run per ref; a new push cancels the previous run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: TS checks (lint · typecheck · contract tests)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm must be on PATH before setup-node so that `cache: pnpm` works and
      # the pinned version from package.json#packageManager is honored.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install (pnpm workspace)
        run: pnpm install --frozen-lockfile

      # Bun services excluded from the pnpm workspace — install from their own
      # frozen lockfiles so `tsgo` typecheck and `bun test` can resolve deps.
      - name: Install (Bun services)
        run: |
          set -euo pipefail
          # host before host-cloud: host-cloud links @houston/host via file:.
          for dir in packages/runtime packages/host packages/host-cloud; do
            echo "::group::bun install — $dir"
            (cd "$dir" && bun install --frozen-lockfile)
            echo "::endgroup::"
          done

      # ---- Lint / format (Biome) ----
      - name: Biome check
        run: pnpm check

      # ---- Package boundary guard ----
      # Enforces the open/closed package boundary (script added in parallel;
      # present once both PRs merge). Kept as its own named step so a failure
      # here is unambiguous.
      - name: Boundary check
        run: pnpm check:boundaries

      # ---- Typecheck ----
      # `pnpm -r typecheck` covers every pnpm workspace member: ui/*, app,
      # packages/domain, packages/protocol, packages/runtime-client, examples/*,
      # and houston-web. (houston-web's typecheck also runs the Tauri shim-parity
      # guard via scripts/check-tauri-shims.mjs, so it is covered here.)
      - name: Typecheck (pnpm workspace)
        run: pnpm -r typecheck

      # runtime + host + host-cloud are outside the pnpm workspace — typecheck
      # them directly with their own tsgo.
      - name: Typecheck (Bun services)
        run: |
          set -euo pipefail
          for dir in packages/runtime packages/host packages/host-cloud; do
            echo "::group::typecheck — $dir"
            (cd "$dir" && bun run typecheck)
            echo "::endgroup::"
          done

      # ---- Contract / unit tests (bun:test) ----
      # The convergence dual-profile + per-port contract suites live in these
      # packages. The open adapters run their shared contract in packages/host;
      # the CLOSED cloud adapters (pg/gcs/redis/gke) run the SAME contract in
      # packages/host-cloud (it imports the contract fns from @houston/host).
      # domain is a pnpm member but uses bun:test, so it runs under Bun too. Each
      # has its own bun.lock; domain resolves its file: links from the pnpm
      # install above, but we install it explicitly to keep the test run hermetic.
      - name: Test (bun:test)
        run: |
          set -euo pipefail
          (cd packages/domain && bun install --frozen-lockfile)
          for dir in packages/domain packages/host packages/host-cloud packages/runtime; do
            echo "::group::bun test — $dir"
            (cd "$dir" && bun test)
            echo "::endgroup::"
          done

  web:
    name: Web (typecheck + unit + UI tests)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # The fake host (packages/web/e2e/fake-host) runs under Bun.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter houston-web exec playwright install --with-deps chromium

      - name: Typecheck (web)
        run: pnpm --filter houston-web typecheck

      - name: Typecheck (e2e harness)
        run: pnpm --filter houston-web typecheck:e2e

      - name: Unit tests (web)
        run: pnpm --filter houston-web test

      - name: UI tests (Playwright)
        run: pnpm --filter houston-web test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/web/playwright-report/
          retention-days: 14
