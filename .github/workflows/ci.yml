# Houston PR CI Gate
#
# Fast, hermetic, secret-free TypeScript gate that runs on every pull request
# targeting `main`. pnpm owns every JS/TS package and Vitest owns unit/contract
# tests. Bun is deliberately absent from this workflow; it remains only for the
# host-sidecar binary compile workflow (`scripts/build-host-sidecar.sh`).

name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      ios: ${{ steps.filter.outputs.ios }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ios:
              - 'mobile/ios/**'
              - 'packages/sdk/**'
              - 'packages/design-tokens/**'
              - 'packages/runtime-client/**'
              - 'packages/protocol/**'
              - 'pnpm-lock.yaml'
              - '.github/workflows/ci.yml'

  checks:
    name: TS checks (lint · typecheck · contract tests)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm check

      - name: Boundary check
        run: pnpm check:boundaries

      - name: AppImage sidecar repair regression test
        run: scripts/test/repair-linux-appimage-sidecar.test.sh

      - name: Parity check (cross-surface component inventory)
        run: pnpm check:parity

      - name: Typecheck (pnpm workspace)
        run: pnpm -r typecheck

      - name: Unit + contract tests (Vitest)
        run: |
          set -euo pipefail
          pnpm --filter @houston/domain test
          pnpm --filter @houston/host test
          pnpm --filter @houston/runtime test
          pnpm --filter @houston/code-sandbox test
          pnpm exec vitest run scripts/check-parity.test.mjs scripts/publish-starter-agents.test.mjs

  web:
    name: Web (typecheck + unit + UI tests)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Stabilize apt sources for Playwright deps
        run: |
          # Playwright's --with-deps path runs apt-get update. GitHub's Ubuntu
          # image includes Microsoft feeds we do not use, and when those feeds
          # return malformed InRelease files the web job dies before tests run.
          sudo rm -f /etc/apt/sources.list.d/azure-cli.*
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.*

      - name: Install Playwright Chromium
        run: pnpm --filter houston-web exec playwright install --with-deps chromium

      - name: Typecheck (web)
        run: pnpm --filter houston-web typecheck

      - name: Typecheck (e2e harness)
        run: pnpm --filter houston-web typecheck:e2e

      - name: Unit tests (web)
        run: pnpm --filter houston-web test

      - name: UI tests (Playwright)
        run: pnpm --filter houston-web test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/web/playwright-report/
          retention-days: 14

  visual:
    name: Visual regression (Playwright screenshots)
    # Runs INSIDE the pinned Playwright image so the render matches the committed
    # `-linux` baselines pixel-for-pixel (same browser build, same fonts). The
    # image tag MUST track `@playwright/test` in packages/web/package.json — bump
    # both together, then regenerate baselines in the same image (see
    # packages/web/e2e/README.md → Visual regression → Platforms).
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Browsers ship in the image (PLAYWRIGHT_BROWSERS_PATH) — no install step.
      - name: Visual tests (Playwright)
        run: pnpm --filter houston-web test:visual

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-report
          path: packages/web/playwright-report/
          retention-days: 14

  app:
    name: App (node:test unit tests)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Unit tests (app)
        run: pnpm --filter houston-app test

  ios:
    name: iOS (xcodegen + xcodebuild test)
    needs: changes
    if: ${{ needs.changes.outputs.ios == 'true' }}
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build SDK bridge
        run: pnpm --filter @houston/sdk build:bridge

      - name: Build design tokens
        run: pnpm --filter @houston/design-tokens build

      - name: Select latest Xcode
        # The image default (Xcode 16.4 / Swift 6.1) crashes in SILGen on the
        # IsolatedDefaultValues pattern the app uses; the app targets the
        # Xcode 26 toolchain it is developed against.
        run: |
          XCODE=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
          echo "Selecting $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate
        working-directory: mobile/ios

      - name: Run tests (xcodebuild)
        working-directory: mobile/ios
        run: |
          set -o pipefail
          xcodebuild -version
          # Pick an available iPhone simulator dynamically; device names vary by
          # Xcode image, so hardcoding one would break on image bumps.
          DEVICE=$(xcrun simctl list devices available \
            | grep -E "iPhone" \
            | head -1 \
            | sed -E 's/^ *//; s/ \(.*//')
          if [ -z "$DEVICE" ]; then
            echo "error: no available iPhone simulator found." >&2
            exit 1
          fi
          echo "Using simulator: $DEVICE"
          # Plain xcodebuild output on purpose: xcpretty swallows the compiler
          # error lines, which makes a red run undiagnosable from the log.
          xcodebuild test \
            -project Houston.xcodeproj \
            -scheme Houston \
            -destination "platform=iOS Simulator,name=$DEVICE" \
            -resultBundlePath "$RUNNER_TEMP/HoustonTests.xcresult" \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload xcresult bundle
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcresult
          path: ${{ runner.temp }}/HoustonTests.xcresult
          retention-days: 14

  agentstore:
    name: Agent Store (contract + app typecheck · tests · DB-less build)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck (contract)
        run: pnpm --filter @houston/agentstore-contract typecheck

      - name: Unit + contract tests (contract)
        run: pnpm --filter @houston/agentstore-contract test

      - name: Typecheck (agentstore)
        run: pnpm --filter houston-agentstore typecheck

      - name: Unit tests (agentstore)
        run: pnpm --filter houston-agentstore test

      - name: Build (agentstore, no database)
        run: pnpm --filter houston-agentstore build
